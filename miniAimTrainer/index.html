<!doctype html>
<html>
    <head>
    <link rel="stylesheet" href="style.css">
    <title>Mini AimTrainer</title> 
    </head>
    <body>
        <p type="tmr" class="tmr" id="tmr">Timer</p>

        <button type="circle" class="circle green" id="circle">
            Click Me!
        </button>
        <button type="circle" class="circle red" id="redCircle">
            Click Me!
        </button>
        <button type="btn" class="btn" id="btn">
            Start Game
        </button>
        <p type="score" class="score" id="score">
            Score: 0
        </p>
        <p type="score" class="finalscore" id="finalscore">
            Score: 0
        </p>
        <script src="script.js"></script>
    </body>
</html>
