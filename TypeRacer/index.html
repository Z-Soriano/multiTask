<!doctype html>
<html>
    <head>
    <link rel="stylesheet" href="style.css">
    <title>MiniTypeRacer</title> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <nav class="navbar">
        <div class="container">
            <ul class="nav-links">
                <li class="nav-item">
                    <div class="dropdown">
                        <button class="dropbtn" id="dropdown-btn">Games</button>
                        <div class="dropdown-content" id="dropdown-menu">
                            <a class="leftText" id="leftText">Left Side Typing</a>
                            <a class="rightText" id="rightText">Right Side Typing</a>
                            <a class="justText" id="justText">Full Keyboard</a>
                            <a class="btn" id="btn">Mini AimTrainer</a>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
        </nav>
        <p id="quote" class="quote"></p>
        <p id="elapsedTime" class="elapsedTime">WPM: </p>
        <p id="accuracy" class="accuracy">Accuracy: </p>
         <p type="tmr" class="tmr" id="tmr">Timer</p>

        <button type="circle" class="circle correct" id="circle">
            Click Me!
        </button>
        <button type="circle" class="circle incorrect" id="redCircle">
            Click Me!
        </button>
        
        <p type="score" class="score" id="score">
            Score: 0
        </p>
        <p type="score" class="finalscore" id="finalscore">
            Score: 0
        </p>


        <script src="script.js"></script>
    </body>
</html>
